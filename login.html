<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomMaps Pro | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-md p-8 w-full max-w-sm">
        <div class="flex items-center justify-center mb-6">
            <i data-feather="map" class="text-blue-600 h-7 w-7"></i>
            <span class="ml-2 text-xl font-semibold text-gray-900">CustomMaps Pro</span>
        </div>

        <div id="error-msg" class="hidden mb-4 px-3 py-2 bg-red-50 border border-red-200 text-red-700 text-sm rounded-md"></div>

        <!-- Login form (shown by default) -->
        <form id="login-form">
            <h2 class="text-lg font-medium text-gray-800 mb-5" id="form-title">Sign in</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input id="username" type="text" autocomplete="username" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input id="password" type="password" autocomplete="current-password" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" id="submit-btn"
                    class="w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-md focus:outline-none transition-colors">
                    Sign in
                </button>
            </div>
        </form>

        <!-- Register form (shown only when no users exist) -->
        <div id="register-note" class="hidden mt-4 text-center text-sm text-gray-500">
            No account yet. Create one to get started.
        </div>
    </div>

    <script>
        feather.replace();

        const errorMsg = document.getElementById('error-msg');
        const form = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const formTitle = document.getElementById('form-title');
        const registerNote = document.getElementById('register-note');

        let isRegisterMode = false;

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        function hideError() {
            errorMsg.classList.add('hidden');
        }

        // Check if any users exist — if not, switch to register mode
        fetch('/api/auth/has-users')
            .then(r => r.json())
            .then(data => {
                if (!data.hasUsers) {
                    isRegisterMode = true;
                    formTitle.textContent = 'Create your account';
                    submitBtn.textContent = 'Create account';
                    registerNote.classList.remove('hidden');
                    document.getElementById('password').autocomplete = 'new-password';
                }
            });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            submitBtn.disabled = true;
            submitBtn.textContent = isRegisterMode ? 'Creating...' : 'Signing in...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            const endpoint = isRegisterMode ? '/api/auth/register' : '/api/auth/login';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/';
                } else {
                    showError(data.error || 'Something went wrong');
                }
            } catch {
                showError('Could not connect to server');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isRegisterMode ? 'Create account' : 'Sign in';
            }
        });
    </script>
</body>
</html>
